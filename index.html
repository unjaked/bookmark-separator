<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chrome Bookmarks Separator</title>

    <link id="favicon" rel="icon" type="image/png" href="favicon-vert.svg" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <main>
        <div>
            <h1>Bookmark Separator</h1>

            <p>Add this page to your favorites to use as a divider for your Bookmarks bar!</p>

            <div class="buttons">
                <p>Change the icon here ↓</p>
                <button class="favicon-option" data-favicon="favicon-vert.svg">
                    Vertical Line
                </button>

                <button class="favicon-option" data-favicon="favicon-blank.svg">
                    Blank
                </button>

            </div>

        </div>
    </main>


    <footer>
        <p>Made by <a href="https://github.com/unjaked/bookmark-separator">unjaked</a> on GitHub</p>
    </footer>


    <script src="script.js"></script>
</body>

</html>
